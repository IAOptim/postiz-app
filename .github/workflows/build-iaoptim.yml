---
name: Build IAOptim Postiz image

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-iaoptim-*'

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.dev \
            -t "ghcr.io/iaoptim/postiz-app:${IMAGE_TAG}" \
            --build-arg NEXT_PUBLIC_VERSION="${IMAGE_TAG}" \
            --provenance=false --sbom=false \
            --push \
            .
